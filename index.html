<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无畏契约赛事中心 - 实时比分</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="#" class="logo">
                <i class="fa-solid fa-bolt"></i> VCT 赛事中心
            </a>
            <ul class="nav-links">
                <li><a href="#" data-tab="live" class="active">正在直播</a></li>
                <li><a href="#" data-tab="upcoming">即将开始</a></li>
                <li><a href="#" data-tab="results">比赛结果</a></li>
                <li><a href="#" data-tab="rankings">战队排名</a></li>
            </ul>
            <div class="nav-info">
                <span class="update-indicator" id="update-indicator">
                    <i class="fa-solid fa-arrows-rotate"></i> <span id="update-text">--</span>
                </span>
            </div>
            <button class="menu-btn" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <main class="container">

        <!-- 正在直播 -->
        <section id="tab-live" class="tab-content active">
            <div class="section-header">
                <h2 class="section-title"><span class="live-dot"></span> 正在直播</h2>
            </div>
            <div class="match-grid" id="live-container"></div>
            <div class="skeleton-grid" id="live-skeleton">
                <div class="skeleton-card"><div class="shimmer"></div></div>
                <div class="skeleton-card"><div class="shimmer"></div></div>
            </div>
            <div class="empty-state hidden" id="live-empty">
                <i class="fa-regular fa-calendar-xmark"></i>
                <p>当前没有正在进行的比赛</p>
                <span>稍后再来看看吧</span>
            </div>
            <div class="error-state hidden" id="live-error">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <p id="live-error-msg">数据加载失败</p>
                <button class="btn-retry" data-tab="live">重新加载</button>
            </div>
        </section>

        <!-- 即将开始 -->
        <section id="tab-upcoming" class="tab-content">
            <div class="section-header">
                <h2 class="section-title"><i class="fa-regular fa-clock"></i> 即将开始</h2>
            </div>
            <div class="match-grid" id="upcoming-container"></div>
            <div class="skeleton-grid" id="upcoming-skeleton">
                <div class="skeleton-card"><div class="shimmer"></div></div>
                <div class="skeleton-card"><div class="shimmer"></div></div>
            </div>
            <div class="empty-state hidden" id="upcoming-empty">
                <i class="fa-regular fa-calendar"></i>
                <p>暂无即将开始的比赛</p>
                <span>新赛程公布后会在这里显示</span>
            </div>
            <div class="error-state hidden" id="upcoming-error">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <p id="upcoming-error-msg">数据加载失败</p>
                <button class="btn-retry" data-tab="upcoming">重新加载</button>
            </div>
        </section>

        <!-- 比赛结果 -->
        <section id="tab-results" class="tab-content">
            <div class="section-header">
                <h2 class="section-title"><i class="fa-solid fa-trophy"></i> 比赛结果</h2>
            </div>
            <div class="match-grid" id="results-container"></div>
            <div class="skeleton-grid" id="results-skeleton">
                <div class="skeleton-card"><div class="shimmer"></div></div>
                <div class="skeleton-card"><div class="shimmer"></div></div>
            </div>
            <div class="empty-state hidden" id="results-empty">
                <i class="fa-regular fa-folder-open"></i>
                <p>暂无比赛结果</p>
                <span>比赛结束后会在这里显示</span>
            </div>
            <div class="error-state hidden" id="results-error">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <p id="results-error-msg">数据加载失败</p>
                <button class="btn-retry" data-tab="results">重新加载</button>
            </div>
        </section>

        <!-- 战队排名 -->
        <section id="tab-rankings" class="tab-content">
            <div class="section-header">
                <h2 class="section-title"><i class="fa-solid fa-ranking-star"></i> 战队排名</h2>
            </div>
            <div class="region-tabs" id="region-tabs">
                <button class="region-btn active" data-region="all">全球</button>
                <button class="region-btn" data-region="North America">北美</button>
                <button class="region-btn" data-region="Europe">欧洲</button>
                <button class="region-btn" data-region="Asia-Pacific">亚太</button>
                <button class="region-btn" data-region="China">中国</button>
                <button class="region-btn" data-region="Korea">韩国</button>
            </div>
            <div class="rankings-table-wrap" id="rankings-container"></div>
            <div class="skeleton-table" id="rankings-skeleton">
                <div class="shimmer"></div>
            </div>
            <div class="empty-state hidden" id="rankings-empty">
                <i class="fa-solid fa-chart-simple"></i>
                <p>暂无排名数据</p>
            </div>
            <div class="error-state hidden" id="rankings-error">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <p id="rankings-error-msg">数据加载失败</p>
                <button class="btn-retry" data-tab="rankings">重新加载</button>
            </div>
        </section>

    </main>

    <!-- 离线提示 -->
    <div class="offline-banner hidden" id="offline-banner">
        <i class="fa-solid fa-wifi-slash"></i> 网络连接已断开，数据可能不是最新的
    </div>

    <footer class="footer">
        <div class="container">
            <p>数据来源：VLR.gg / esport.is &nbsp;|&nbsp; 非官方粉丝网站 &nbsp;|&nbsp; <a href="https://github.com/HaBDog/Mywebsites" target="_blank"><i class="fa-brands fa-github"></i> GitHub</a></p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/render.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
